<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apu Apustaja</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #4CAF50;
    --dark-green: #2e7d32;
    --yellow: #FFD700;
    --cream: #FFF8E7;
    --dark: #0d1117;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); font-family:'Baloo 2',cursive; overflow-x:hidden; min-height:100vh; }

  .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .star { position:absolute; background:white; border-radius:50%; animation:twinkle var(--dur) infinite alternate; }
  @keyframes twinkle { from{opacity:.1;transform:scale(1)} to{opacity:1;transform:scale(1.4)} }

  .frog-bg { position:fixed; opacity:.07; animation:floatFrog linear infinite; pointer-events:none; z-index:0; object-fit:contain; }
  @keyframes floatFrog { from{transform:translateY(110vh) rotate(0deg)} to{transform:translateY(-10vh) rotate(360deg)} }

  header { position:relative; z-index:10; text-align:center; padding:60px 20px 10px; }
  h1 {
    font-family:'Lilita One',cursive;
    font-size:clamp(3rem,9vw,7rem);
    color:var(--yellow);
    text-shadow:4px 4px 0 var(--dark-green),0 0 40px rgba(76,175,80,.5);
    animation:wiggle 3s ease-in-out infinite;
  }
  @keyframes wiggle { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
  .subtitle { font-size:clamp(1rem,3vw,1.4rem); color:var(--green); font-weight:600; letter-spacing:4px; text-transform:uppercase; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .subtitle-icon { width:32px; height:32px; object-fit:contain; }

  .hero { position:relative; z-index:10; display:flex; justify-content:center; padding:30px 20px 10px; }
  .apu-main {
    width:clamp(160px,30vw,280px);
    filter:drop-shadow(0 0 30px rgba(76,175,80,.7)) drop-shadow(0 0 60px rgba(76,175,80,.3));
    animation:apuBounce 2s ease-in-out infinite;
  }
  @keyframes apuBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  .ca-container { position:relative; z-index:10; margin:36px auto; max-width:740px; padding:0 20px; }
  .ca-box {
    background:linear-gradient(135deg,rgba(76,175,80,.12),rgba(124,77,255,.12));
    border:2px solid var(--green); border-radius:20px; padding:28px 32px;
    text-align:center; box-shadow:0 0 40px rgba(76,175,80,.2),inset 0 0 40px rgba(76,175,80,.04);
    position:relative; overflow:hidden;
  }
  .ca-box::before {
    content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
    background:conic-gradient(transparent,rgba(76,175,80,.05),transparent 30%);
    animation:rotateBg 6s linear infinite;
  }
  @keyframes rotateBg { to{transform:rotate(360deg)} }
  .ca-label { font-family:'Lilita One',cursive; font-size:1.1rem; color:var(--yellow); letter-spacing:6px; text-transform:uppercase; margin-bottom:14px; position:relative; z-index:1; display:flex; align-items:center; justify-content:center; gap:10px; }
  .ca-label-icon { width:28px; height:28px; object-fit:contain; }
  .ca-text { display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; position:relative; z-index:1; }
  .ca-prefix { font-weight:800; font-size:clamp(.9rem,2vw,1.1rem); color:var(--green); white-space:nowrap; }
  .ca-address {
    font-family:'Courier New',monospace; font-size:clamp(.65rem,1.7vw,.95rem); color:var(--cream);
    word-break:break-all; background:rgba(0,0,0,.35); padding:8px 14px; border-radius:10px;
    border:1px solid rgba(76,175,80,.3); cursor:pointer; transition:all .2s; user-select:all; letter-spacing:.5px;
  }
  .ca-address:hover { background:rgba(76,175,80,.15); border-color:var(--green); color:var(--yellow); box-shadow:0 0 20px rgba(76,175,80,.4); }
  .copy-btn {
    background:var(--green); color:#000; border:none; border-radius:10px;
    padding:10px 20px; font-family:'Lilita One',cursive; font-size:1rem;
    cursor:pointer; transition:all .2s; white-space:nowrap; box-shadow:0 4px 15px rgba(76,175,80,.4);
    display:flex; align-items:center; gap:6px;
  }
  .copy-btn .btn-icon { width:20px; height:20px; object-fit:contain; }
  .copy-btn:hover { background:var(--yellow); transform:translateY(-2px) scale(1.05); }
  .copy-btn.copied { background:var(--yellow); animation:pop .3s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }

  .gallery-section { position:relative; z-index:10; max-width:1100px; margin:10px auto 60px; padding:0 20px; }
  .gallery-title { font-family:'Lilita One',cursive; font-size:clamp(1.8rem,5vw,2.8rem); color:var(--green); text-align:center; margin-bottom:24px; text-shadow:2px 2px 0 var(--dark-green),0 0 20px rgba(76,175,80,.4); display:flex; align-items:center; justify-content:center; gap:12px; }
  .gallery-title-icon { width:40px; height:40px; object-fit:contain; }
  .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }
  .gallery-item {
    background:rgba(255,255,255,.04); border-radius:16px; overflow:hidden;
    border:2px solid rgba(76,175,80,.2); transition:all .3s; cursor:pointer;
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  }
  .gallery-item:hover { border-color:var(--green); transform:translateY(-6px) rotate(1deg) scale(1.03); box-shadow:0 10px 30px rgba(76,175,80,.3); }
  .gallery-item img { width:100%; height:100%; object-fit:cover; display:block; }

  footer { position:relative; z-index:10; text-align:center; padding:28px 20px; color:rgba(255,255,255,.3); font-size:.9rem; border-top:1px solid rgba(76,175,80,.15); display:flex; align-items:center; justify-content:center; gap:8px; }
  footer span { color:var(--green); }
  footer img { width:24px; height:24px; object-fit:contain; opacity:.8; }

  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green); color:#000; font-family:'Lilita One',cursive; font-size:1.1rem; padding:12px 28px; border-radius:50px; box-shadow:0 4px 30px rgba(76,175,80,.6); transition:transform .3s cubic-bezier(.175,.885,.32,1.275); z-index:999; pointer-events:none; display:flex; align-items:center; gap:8px; }
  .toast img { width:24px; height:24px; object-fit:contain; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  ::-webkit-scrollbar{width:8px} ::-webkit-scrollbar-track{background:var(--dark)} ::-webkit-scrollbar-thumb{background:var(--green);border-radius:4px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="frogs"></div>

<header>
  <h1>APU APUSTAJA</h1>
  <p class="subtitle">
    <img class="subtitle-icon" src="images/apu-icon.png" alt="apu">
    Feels Good Man
    <img class="subtitle-icon" src="images/apu-icon.png" alt="apu">
  </p>
</header>

<div class="hero">
  <img class="apu-main" src="images/apu-hero.png" alt="Apu">
</div>

<div class="ca-container">
  <div class="ca-box">
    <div class="ca-label">
      <img class="ca-label-icon" src="images/apu-icon.png" alt="apu">
      Contract Address
      <img class="ca-label-icon" src="images/apu-icon.png" alt="apu">
    </div>
    <div class="ca-text">
      <span class="ca-prefix">CA:</span>
      <span class="ca-address" id="caAddress">EpKoFHZi4AQmjMU222Kt7NFqE7HJi5YaAziueDaUSpLt</span>
      <button class="copy-btn" id="copyBtn" onclick="copyCA()">
        <img class="btn-icon" src="images/apu-icon.png" alt="">
        COPY
      </button>
    </div>
  </div>
</div>

<div class="gallery-section">
  <h2 class="gallery-title">
    <img class="gallery-title-icon" src="images/apu-icon.png" alt="apu">
    Apu Gallery
    <img class="gallery-title-icon" src="images/apu-icon.png" alt="apu">
  </h2>
  <div class="gallery">
    <div class="gallery-item"><img src="images/apu-01.png" alt="Apu 1"></div>
    <div class="gallery-item"><img src="images/apu-02.png" alt="Apu 2"></div>
    <div class="gallery-item"><img src="images/apu-03.png" alt="Apu 3"></div>
    <div class="gallery-item"><img src="images/apu-04.png" alt="Apu 4"></div>
    <div class="gallery-item"><img src="images/apu-05.png" alt="Apu 5"></div>
    <div class="gallery-item"><img src="images/apu-06.png" alt="Apu 6"></div>
    <div class="gallery-item"><img src="images/apu-07.png" alt="Apu 7"></div>
    <div class="gallery-item"><img src="images/apu-08.png" alt="Apu 8"></div>
    <div class="gallery-item"><img src="images/apu-09.png" alt="Apu 9"></div>
  </div>
</div>

<footer>
  <img src="images/apu-icon.png" alt="apu">
  Made with 💚 for <span>Apu Apustaja</span> — the goodest fren
  <img src="images/apu-icon.png" alt="apu">
</footer>
<div class="toast" id="toast"><img src="images/apu-icon.png" alt="apu"> ¡Copiado!</div>

<script>
const starsEl=document.getElementById('stars');
for(let i=0;i<120;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*3+1;
  s.style.width=sz+'px';s.style.height=sz+'px';
  s.style.top=Math.random()*100+'%';s.style.left=Math.random()*100+'%';
  s.style.setProperty('--dur',(Math.random()*3+1.5)+'s');
  s.style.animationDelay=Math.random()*3+'s';
  starsEl.appendChild(s);
}
const frogsEl=document.getElementById('frogs');
for(let i=0;i<14;i++){
  const f=document.createElement('img');
  f.className='frog-bg';f.src='images/apu-icon.png';f.alt='';
  const sz=Math.random()*40+30;
  f.style.width=sz+'px';f.style.height=sz+'px';
  f.style.left=Math.random()*100+'%';
  f.style.animationDuration=(Math.random()*15+10)+'s';
  f.style.animationDelay='-'+(Math.random()*20)+'s';
  frogsEl.appendChild(f);
}
function copyCA(){
  const ca='EpKoFHZi4AQmjMU222Kt7NFqE7HJi5YaAziueDaUSpLt';
  navigator.clipboard.writeText(ca).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.innerHTML='<img class="btn-icon" src="images/apu-icon.png" alt=""> COPIED!';
    btn.classList.add('copied');showToast();
    setTimeout(()=>{btn.innerHTML='<img class="btn-icon" src="images/apu-icon.png" alt=""> COPY';btn.classList.remove('copied');},2000);
  }).catch(()=>{
    const el=document.getElementById('caAddress');
    const r=document.createRange();r.selectNodeContents(el);
    window.getSelection().removeAllRanges();window.getSelection().addRange(r);
    document.execCommand('copy');showToast();
  });
}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
</script>
</body>
</html>
